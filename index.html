<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="Spatialtour — AI-Guided Spatial Presentation Platform" />
  <title>Spatialtour</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/src/styles/main.css" />
  <script src="/config.js"></script>
</head>
<body>
  <div id="app">
    <!-- Loading screen -->
    <div id="loading-screen">
      <div class="loading-content">
        <div class="spinner"></div>
        <h1>Spatialtour</h1>
        <p id="loading-status">Initializing...</p>
      </div>
    </div>

    <!-- 3D viewport canvas -->
    <div id="viewport"></div>

    <!-- UI Overlay -->
    <div id="ui-overlay">
      <!-- Top bar -->
      <div id="top-bar">
        <div class="brand">Spatialtour</div>
        <div class="top-actions">
          <button id="btn-voice" class="voice-btn" title="Tap to speak">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </button>
          <button id="btn-text-input" class="icon-btn" title="Type instead">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
          </button>
          <button id="btn-admin" class="icon-btn" title="Admin / Edit Zones">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          </button>
        </div>
      </div>

      <!-- Voice indicator (shows while listening) -->
      <div id="voice-indicator" class="hidden">
        <div class="voice-pulse"></div>
        <span id="voice-transcript"></span>
      </div>

      <!-- Chat panel (right side) -->
      <div id="chat-panel" class="panel">
        <div class="panel-header">
          <h3>Facility Guide</h3>
          <button id="btn-close-chat" class="icon-btn">✕</button>
        </div>
        <div id="chat-messages" class="chat-messages">
          <div class="message system">
            Welcome. Ask me about this facility.
          </div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Type a question..." />
          <button id="btn-send" class="send-btn">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>

      <!-- Content panel (bottom slide-up) -->
      <div id="content-panel" class="content-panel hidden">
        <div class="content-handle"></div>
        <div id="content-body"></div>
      </div>

      <!-- Zone editor panel (left side, admin mode) -->
      <div id="editor-panel" class="panel editor-panel hidden" style="left:0;right:auto;width:320px;">
        <div class="panel-header">
          <h3>Zone Editor</h3>
          <button id="btn-close-editor" class="icon-btn">✕</button>
        </div>
        <div id="editor-body">
          <button id="btn-add-zone" class="btn-primary">+ Add Zone</button>
          <div id="zone-list" class="zone-list"></div>
        </div>
      </div>

      <!-- Mode indicator -->
      <div id="mode-badge" class="mode-badge">Explore</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
